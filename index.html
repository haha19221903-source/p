<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracking Paket Ultimate</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #121212;
      color: white;
    }
    .container {
      max-width: 450px;
      margin: 20px auto;
      padding: 20px;
    }
    h2 { text-align: center; }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
    }
    input { background: #1e1e1e; color: white; }
    button {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      cursor: pointer;
    }
    .card {
      background: #1e1e1e;
      padding: 12px;
      border-radius: 10px;
      margin-top: 10px;
    }
    .status { font-weight: bold; color: #8ab4f8; }
  </style>
</head>
<body><div class="container">
  <h2>📦 Tracking Ultimate</h2>  <input type="text" id="resi" placeholder="Tambah resi">
  <button onclick="addResi()">➕ Tambah</button>  <div id="list"></div>
</div><script>
const API_KEY = "ba8eb0ec1c976ce4e5dbd142025893cb55d48830b15bc4f6867bdea5289eff64";
let resiList = JSON.parse(localStorage.getItem("resiList")) || [];

function detectCourier(resi) {
  if (resi.startsWith("SPX")) return "spx";
  if (resi.length === 13) return "jne";
  if (resi.length === 12) return "jnt";
  return "jne";
}

function save() {
  localStorage.setItem("resiList", JSON.stringify(resiList));
}

function addResi() {
  const resi = document.getElementById("resi").value;
  if (!resi) return;
  resiList.push(resi);
  save();
  render();
}

async function track(resi) {
  const courier = detectCourier(resi);
  try {
    const res = await fetch(`https://api.allorigins.win/raw?url=https://api.binderbyte.com/v1/track?api_key=${API_KEY}&courier=${courier}&awb=${resi}`);
    const data = await res.json();

    if (data.status == 200) {
      const status = data.data.summary.status;

      if (Notification.permission === "granted") {
        new Notification("Update Paket", { body: resi + ": " + status });
      }

      return `
        <div class="card">
          <div class="status">${resi} - ${status}</div>
        </div>`;
    }
  } catch {}
  return `<div class="card">${resi} - error</div>`;
}

async function render() {
  const listDiv = document.getElementById("list");
  listDiv.innerHTML = "Loading...";

  let html = "";
  for (let r of resiList) {
    html += await track(r);
  }

  listDiv.innerHTML = html;
}

// auto refresh
setInterval(render, 30000);

// notif permission
Notification.requestPermission();

render();
</script></body>
</html>
